<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Book Slot</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style> body { background: #f0f4f8; } </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/patient/dashboard"><i class="bi bi-hospital"></i> Clinic System</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/patient/doctors" class="btn btn-outline-light btn-sm">Back to Doctors</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <!-- Doctor info header -->
    <div class="card mb-4 border-primary">
        <div class="card-body d-flex align-items-center gap-3">
            <div class="bg-primary text-white rounded-circle d-flex align-items-center justify-content-center"
                 style="width:55px;height:55px;font-size:1.5rem;">
                <i class="bi bi-person-badge"></i>
            </div>
            <div>
                <h5 class="mb-0" th:text="'Dr. ' + ${doctor.name}">Doctor Name</h5>
                <span class="text-muted" th:text="${doctor.specialization}">Specialization</span>
            </div>
        </div>
    </div>

    <h5><i class="bi bi-clock"></i> Available Time Slots</h5>

    <!-- No slots message -->
    <div th:if="${slots.isEmpty()}" class="alert alert-warning mt-3">
        <i class="bi bi-exclamation-triangle"></i>
        No available slots for this doctor right now. Please check back later.
    </div>

    <!-- Slots table -->
    <div th:if="${!slots.isEmpty()}" class="card mt-3">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th><i class="bi bi-play-circle"></i> Start Time</th>
                        <th><i class="bi bi-stop-circle"></i> End Time</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="slot, iter : ${slots}">
                        <td th:text="${iter.count}">1</td>
                        <td>
                            <span class="badge bg-success fs-6" th:text="${slot.startTime}">09:00 AM</span>
                        </td>
                        <td>
                            <span class="badge bg-secondary fs-6" th:text="${slot.endTime}">09:30 AM</span>
                        </td>
                        <td>
                            <!-- Step 3: Submit booking form -->
                            <form action="/patient/book" method="post" style="display:inline;">
                                <input type="hidden" name="doctorId" th:value="${doctor.id}"/>
                                <input type="hidden" name="slotId" th:value="${slot.id}"/>
                                <button type="submit" class="btn btn-success btn-sm"
                                        onclick="return confirm('Confirm booking this slot?')">
                                    <i class="bi bi-check-circle"></i> Book
                                </button>
                            </form>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
