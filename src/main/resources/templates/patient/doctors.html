<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Our Doctors</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f0f4f8; }
        .doctor-card { transition: transform 0.2s; }
        .doctor-card:hover { transform: translateY(-3px); box-shadow: 0 6px 18px rgba(0,0,0,0.12); }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/patient/dashboard"><i class="bi bi-hospital"></i> Clinic System</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/patient/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/logout" class="btn btn-outline-light btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h4><i class="bi bi-people"></i> Available Doctors</h4>
        <a href="/patient/my-appointments" class="btn btn-outline-success btn-sm">
            <i class="bi bi-journal-medical"></i> My Appointments
        </a>
    </div>

    <!-- No doctors message -->
    <div th:if="${doctors.isEmpty()}" class="alert alert-info">
        No doctors available at the moment. Please check back later.
    </div>

    <!-- Doctor cards -->
    <div class="row g-4">
        <div th:each="doc : ${doctors}" class="col-md-4">
            <div class="card doctor-card h-100">
                <div class="card-body text-center">
                    <div class="bg-primary text-white rounded-circle d-inline-flex align-items-center justify-content-center mb-3"
                         style="width:70px;height:70px;font-size:2rem;">
                        <i class="bi bi-person-badge"></i>
                    </div>
                    <h5 class="card-title" th:text="'Dr. ' + ${doc.name}">Doctor Name</h5>
                    <p class="text-muted">
                        <i class="bi bi-heart-pulse"></i>
                        <span th:text="${doc.specialization}">Specialization</span>
                    </p>
                </div>
                <div class="card-footer text-center bg-white">
                    <!-- Link to Step 2: select a time slot -->
                    <a th:href="@{/patient/slots/{id}(id=${doc.id})}"
                       class="btn btn-primary">
                        <i class="bi bi-clock"></i> View Available Slots
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
