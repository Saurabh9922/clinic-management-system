<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Patient Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f0f4f8; }
        .navbar-brand { font-weight: bold; }
        .card-action { cursor: pointer; transition: transform 0.2s; }
        .card-action:hover { transform: translateY(-4px); box-shadow: 0 6px 20px rgba(0,0,0,0.12); }
    </style>
</head>
<body>

<!-- Navigation Bar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand" href="/patient/dashboard">
            <i class="bi bi-hospital"></i> Clinic System
        </a>
        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white">
                <i class="bi bi-person-circle"></i>
                Welcome, <strong th:text="${user.name}">Patient</strong>
            </span>
            <a href="/logout" class="btn btn-outline-light btn-sm">
                <i class="bi bi-box-arrow-right"></i> Logout
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">

    <h4 class="mb-4">Patient Dashboard</h4>

    <div class="row g-4">
        <!-- Book Appointment Card -->
        <div class="col-md-4">
            <a href="/patient/doctors" class="text-decoration-none">
                <div class="card card-action text-center p-4 h-100 border-primary">
                    <i class="bi bi-calendar-plus text-primary" style="font-size: 3rem;"></i>
                    <h5 class="mt-3">Book Appointment</h5>
                    <p class="text-muted small">Browse doctors and book a time slot</p>
                </div>
            </a>
        </div>

        <!-- My Appointments Card -->
        <div class="col-md-4">
            <a href="/patient/my-appointments" class="text-decoration-none">
                <div class="card card-action text-center p-4 h-100 border-success">
                    <i class="bi bi-journal-medical text-success" style="font-size: 3rem;"></i>
                    <h5 class="mt-3">My Appointments</h5>
                    <p class="text-muted small">View and manage your appointments</p>
                </div>
            </a>
        </div>

        <!-- View Doctors Card -->
        <div class="col-md-4">
            <a href="/patient/doctors" class="text-decoration-none">
                <div class="card card-action text-center p-4 h-100 border-info">
                    <i class="bi bi-people text-info" style="font-size: 3rem;"></i>
                    <h5 class="mt-3">Our Doctors</h5>
                    <p class="text-muted small">View all available doctors</p>
                </div>
            </a>
        </div>
    </div>
</div>
</body>
</html>
