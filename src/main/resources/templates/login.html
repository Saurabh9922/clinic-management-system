<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Clinic Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f0f4f8; }
        .login-card {
            max-width: 420px;
            margin: 80px auto;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        .clinic-header {
            background: #0d6efd;
            color: white;
            padding: 24px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-card bg-white">

    <!-- Header -->
    <div class="clinic-header">
        <i class="bi bi-hospital fs-1"></i>
        <h4 class="mt-2 mb-0">Clinic Management System</h4>
        <small>Your Health, Our Priority</small>
    </div>

    <!-- Form -->
    <div class="p-4">
        <h5 class="mb-3">Login to your account</h5>

        <!-- Success message after registration -->
        <div th:if="${param.registered}" class="alert alert-success py-2">
            Registration successful! Please login.
        </div>
        <!-- Success message after logout -->
        <div th:if="${param.logout}" class="alert alert-info py-2">
            You have been logged out.
        </div>
        <!-- Error message -->
        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

        <form action="/login" method="post">
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary w-100">
                <i class="bi bi-box-arrow-in-right"></i> Login
            </button>
        </form>

        <hr>
        <p class="text-center mb-0">
            Don't have an account?
            <a href="/register">Register here</a>
        </p>

        <!-- Admin hint for development
        <div class="mt-3 p-2 bg-light rounded small text-muted">
            <strong>Admin Login:</strong> admin@clinic.com / admin123<br>
            <strong>Test Patient:</strong> Register a new account
        </div>
        -->
    </div>
</div>
</body>
</html>
