<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>All Appointments</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style> body { background: #f0f4f8; } </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard"><i class="bi bi-shield-check"></i> Admin Panel</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/admin/doctors" class="btn btn-outline-light btn-sm">Doctors</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-3"><i class="bi bi-calendar-check"></i> All Appointments</h4>

    <div th:if="${appointments.isEmpty()}" class="alert alert-info">No appointments yet.</div>

    <div th:if="${!appointments.isEmpty()}" class="card">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                    <tr>
                        <th>#</th>
                        <th>Patient Name</th>
                        <th>Patient Email</th>
                        <th>Doctor</th>
                        <th>Specialization</th>
                        <th>Start Time</th>
                        <th>End Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appt, iter : ${appointments}">
                        <td th:text="${iter.count}">1</td>
                        <td th:text="${appt.user.name}">Patient</td>
                        <td th:text="${appt.user.email}">Email</td>
                        <td th:text="'Dr. ' + ${appt.doctor.name}">Doctor</td>
                        <td th:text="${appt.doctor.specialization}">Spec</td>
                        <td th:text="${appt.timeSlot.startTime}">Start</td>
                        <td th:text="${appt.timeSlot.endTime}">End</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${appt.status == 'BOOKED'} ? 'bg-success' : 'bg-danger'"
                                  th:text="${appt.status}">
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
