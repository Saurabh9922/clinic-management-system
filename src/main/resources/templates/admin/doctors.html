<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Doctors</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style> body { background: #f0f4f8; } </style>
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard"><i class="bi bi-shield-check"></i> Admin Panel</a>
        <div class="ms-auto d-flex gap-2">
            <a href="/admin/dashboard" class="btn btn-outline-light btn-sm">Dashboard</a>
            <a href="/admin/appointments" class="btn btn-outline-light btn-sm">Appointments</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <div class="row g-4">

        <!-- Add Doctor Form -->
        <div class="col-md-4">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <i class="bi bi-person-plus"></i> Add New Doctor
                </div>
                <div class="card-body">
                    <!-- Success message -->
                    <div th:if="${param.success}" class="alert alert-success py-2 small"
                         th:text="${param.success}">
                    </div>

                    <form action="/admin/doctors/add" method="post">
                        <div class="mb-3">
                            <label class="form-label">Doctor Name</label>
                            <input type="text" name="name" class="form-control"
                                   placeholder="e.g. Ravi Sharma" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Specialization</label>
                            <input type="text" name="specialization" class="form-control"
                                   placeholder="e.g. Cardiologist" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">
                            <i class="bi bi-plus-circle"></i> Add Doctor
                        </button>
                    </form>
                </div>
            </div>
        </div>

        <!-- Doctors List -->
        <div class="col-md-8">
            <div class="card">
                <div class="card-header"><i class="bi bi-people"></i> All Doctors</div>
                <div class="card-body p-0">
                    <div th:if="${doctors.isEmpty()}" class="p-3 text-muted">
                        No doctors added yet.
                    </div>
                    <table th:if="${!doctors.isEmpty()}" class="table table-hover mb-0">
                        <thead class="table-light">
                            <tr>
                                <th>#</th>
                                <th>Name</th>
                                <th>Specialization</th>
                                <th>Slots</th>
                                <th>Delete</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="doc, iter : ${doctors}">
                                <td th:text="${iter.count}">1</td>
                                <td th:text="'Dr. ' + ${doc.name}">Name</td>
                                <td th:text="${doc.specialization}">Spec</td>
                                <td>
                                    <!-- Link to manage slots for this doctor -->
                                    <a th:href="@{/admin/slots/{id}(id=${doc.id})}"
                                       class="btn btn-sm btn-outline-info">
                                        <i class="bi bi-clock"></i> Manage Slots
                                    </a>
                                </td>
                                <td>
                                    <form th:action="@{/admin/doctors/delete/{id}(id=${doc.id})}"
                                          method="post" style="display:inline;">
                                        <button type="submit" class="btn btn-sm btn-outline-danger"
                                                onclick="return confirm('Delete this doctor and all their slots?')">
                                            <i class="bi bi-trash"></i>
                                        </button>
                                    </form>
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
