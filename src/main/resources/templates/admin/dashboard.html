<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f0f4f8; }
        .stat-card { border-left: 4px solid; transition: transform 0.2s; }
        .stat-card:hover { transform: translateY(-3px); }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="/admin/dashboard">
            <i class="bi bi-shield-check"></i> Admin Panel
        </a>
        <div class="ms-auto d-flex gap-2">
            <a href="/admin/doctors" class="btn btn-outline-light btn-sm">Doctors</a>
            <a href="/admin/appointments" class="btn btn-outline-light btn-sm">Appointments</a>
            <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
    <h4 class="mb-4"><i class="bi bi-speedometer2"></i> Admin Dashboard</h4>

    <!-- Stats Row -->
    <div class="row g-4 mb-4">
        <div class="col-md-4">
            <div class="card stat-card border-primary p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-muted small">Total Doctors</div>
                        <h3 class="mb-0 text-primary" th:text="${doctorCount}">0</h3>
                    </div>
                    <i class="bi bi-people text-primary" style="font-size:2.5rem;opacity:0.4;"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-success p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-muted small">Total Appointments</div>
                        <h3 class="mb-0 text-success" th:text="${appointmentCount}">0</h3>
                    </div>
                    <i class="bi bi-calendar-check text-success" style="font-size:2.5rem;opacity:0.4;"></i>
                </div>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card stat-card border-warning p-3">
                <div class="d-flex justify-content-between align-items-center">
                    <div>
                        <div class="text-muted small">Quick Links</div>
                        <a href="/admin/doctors" class="btn btn-sm btn-warning mt-1">Manage Doctors</a>
                    </div>
                    <i class="bi bi-gear text-warning" style="font-size:2.5rem;opacity:0.4;"></i>
                </div>
            </div>
        </div>
    </div>

    <!-- Recent Appointments -->
    <div class="card">
        <div class="card-header d-flex justify-content-between align-items-center">
            <span><i class="bi bi-clock-history"></i> Recent Appointments</span>
            <a href="/admin/appointments" class="btn btn-sm btn-outline-primary">View All</a>
        </div>
        <div class="card-body p-0">
            <div th:if="${appointments.isEmpty()}" class="p-3 text-muted">No appointments yet.</div>
            <table th:if="${!appointments.isEmpty()}" class="table mb-0">
                <thead class="table-light">
                    <tr>
                        <th>Patient</th>
                        <th>Doctor</th>
                        <th>Time</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="appt : ${appointments}">
                        <td th:text="${appt.user.name}">Patient</td>
                        <td th:text="'Dr. ' + ${appt.doctor.name}">Doctor</td>
                        <td th:text="${appt.timeSlot.startTime} + ' - ' + ${appt.timeSlot.endTime}">Time</td>
                        <td>
                            <span class="badge"
                                  th:classappend="${appt.status == 'BOOKED'} ? 'bg-success' : 'bg-danger'"
                                  th:text="${appt.status}">
                            </span>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
