<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Register - Clinic Management</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <style>
        body { background: #f0f4f8; }
        .register-card {
            max-width: 450px;
            margin: 60px auto;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.1);
        }
        .clinic-header {
            background: #198754;
            color: white;
            padding: 24px;
            border-radius: 12px 12px 0 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="register-card bg-white">
    <div class="clinic-header">
        <i class="bi bi-person-plus fs-1"></i>
        <h4 class="mt-2 mb-0">Create Patient Account</h4>
    </div>
    <div class="p-4">
        <!-- Error message -->
        <div th:if="${error}" class="alert alert-danger py-2" th:text="${error}"></div>

        <form action="/register" method="post" th:object="${user}">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" name="name" class="form-control"
                       placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email address</label>
                <input type="email" name="email" class="form-control"
                       placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" name="password" class="form-control"
                       placeholder="Minimum 4 characters" required minlength="4">
            </div>
            <button type="submit" class="btn btn-success w-100">
                <i class="bi bi-person-check"></i> Register
            </button>
        </form>
        <hr>
        <p class="text-center mb-0">
            Already have an account? <a href="/login">Login here</a>
        </p>
    </div>
</div>
</body>
</html>
